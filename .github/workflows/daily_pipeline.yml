name: Daily Stock ETL Pipeline

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily pipeline
        run: python main.py

      - name: Commit updated data and model files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update daily stock data, predictions, and model"
          file_pattern: "data/stock_data.db models/best_model.joblib logs/.gitkeep"
